<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#061a3d">
    <link rel="apple-touch-icon" href="logo.jpg">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    <title>IAA Smart Attendance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --primary-blue: #00d2ff;
            --deep-blue: #061a3d;
            --accent-red: #ff4d4d;
        }

        body {
            background: linear-gradient(rgba(6, 26, 61, 0.9), rgba(30, 60, 114, 0.8)),
                url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Style ya Button ya Lugha */
        .lang-container {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            margin-bottom: -10px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s all ease;
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lang-btn:hover {
            background: var(--primary-blue);
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .lang-btn i {
            font-size: 14px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(35px) saturate(180%);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 480px;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid var(--primary-blue);
            background: white;
        }

        h2,
        h3 {
            margin-bottom: 15px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            background: linear-gradient(90deg, #1e3c72 0%, #00d2ff 100%);
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-red {
            background: linear-gradient(90deg, #d31027 0%, #ea384d 100%);
        }

        .hidden {
            display: none;
        }

        .lec-list-header {
            background: rgba(0, 210, 255, 0.2);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 12px;
            text-align: left;
            border: 1px solid var(--primary-blue);
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            text-align: left;
            border-left: 4px solid var(--primary-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .token-display {
            font-size: 40px;
            font-weight: bold;
            color: var(--primary-blue);
            margin: 15px 0;
        }

        .analysis-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: left;
            margin-top: 10px;
        }

        .day-stat {
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="lang-container">
            <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">
                English 🌐
            </button>
        </div>

        <img src="logo.jpg" alt="IAA Logo" class="logo">

        <div id="landingView">
            <h2 data-key="landingTitle">IAA Smart Attendance Portal</h2>
            <button class="btn" onclick="switchView('registerView')" data-key="landingReg">Tengeneza Akaunti</button>
            <button class="btn" style="background:transparent; border:1px solid var(--primary-blue);"
                onclick="switchView('loginView')" data-key="landingLog">Ingia</button>
        </div>

        <div id="registerView" class="hidden">
            <h3 data-key="regHeader">Jisajili</h3>
            <input type="text" id="regName" data-key="phName" placeholder="Majina Matatu">
            <input type="number" id="regPhone" data-key="phPhone" placeholder="Namba ya Simu">
            <select id="regRole" onchange="toggleRegFields()">
                <option value="CR">CR</option>
                <option value="Lecturer">Lecturer</option>
            </select>
            <div id="crExtraFields">
                <input type="text" id="regCourse" data-key="phCourse" placeholder="Kozi (mf. IT Diploma)">
                <input type="text" id="regLevel" data-key="phLevel" placeholder="Level (mf. NTA 5)">
                <input type="text" id="regYear" data-key="phYear" placeholder="Mwaka (mf. 2025/26)">
                <select id="regIntake">
                    <option value="">Chagua Intake</option>
                    <option value="March">March</option>
                    <option value="September">September</option>
                </select>
            </div>
            <div id="lecExtraFields" class="hidden">
                <input type="text" id="regSubject" data-key="phSubj" placeholder="Somo Lako Kuu">
            </div>
            <button class="btn" id="regBtn" onclick="handleRegister()" data-key="regBtnTxt">Kamilisha</button>
            <button class="btn btn-red" onclick="switchView('landingView')" data-key="backBtn">Rudi</button>
        </div>

        <div id="loginView" class="hidden">
            <h3 data-key="loginHeader">Ingia</h3>
            <input type="text" id="logName" data-key="phFull" placeholder="Jina Lako Kamili">
            <button class="btn" onclick="handleLogin()" data-key="loginBtnTxt">Ingia Sasa</button>
            <button class="btn btn-red" onclick="switchView('landingView')" data-key="backBtn">Rudi</button>
        </div>

        <div id="crDashboard" class="hidden">
            <div class="lec-list-header">
                <strong data-key="lecList">Ma-Lecturer Waliopo:</strong><br>
                <div id="lecContactsDisplay">Inapakia...</div>
            </div>
            <h3><span data-key="crPanel">CR Panel:</span> <span id="crCourseName"></span></h3>
            <div id="studentManager">
                <input type="text" id="newStdName" data-key="phStd" placeholder="Jina la Mwanafunzi">
                <button class="btn" onclick="addStudent()" data-key="addStd">Ongeza Mwanafunzi</button>
            </div>
            <div id="studentListDisplay" style="margin-top:20px;">Inapakia wanafunzi...</div>
            <hr>
            <button class="btn" onclick="switchView('tokenView')" data-key="genToken">Tengeneza Kodi (Dakika 3)</button>
            <button class="btn btn-red" onclick="logout()" data-key="logout">Logout</button>
        </div>

        <div id="studentDetailView" class="hidden">
            <h3 id="detStdName">...</h3>
            <div class="analysis-box">
                <strong data-key="last5">Vipindi Siku 5 Zilizopita:</strong>
                <div id="fiveDayStat"></div>
            </div>
            <div class="analysis-box" style="margin-top:15px;">
                <strong data-key="monthly">Muhtasari wa Mwezi:</strong>
                <div id="monthlyStat"></div>
            </div>
            <button class="btn" onclick="goBackToDashboard()" data-key="backBtn">Rudi</button>
        </div>

        <div id="lecDashboard" class="hidden">
            <h3 data-key="lecDash">Mhadhiri Dashboard</h3>
            <div class="lec-list-header">Karibu Dr/Mr. <span id="lecNameShow"></span></div>
            <select id="filterLevel">
                <option value="">Chagua Level</option>
            </select>
            <select id="filterYear">
                <option value="">Mwaka wa Masomo</option>
            </select>
            <select id="filterIntake">
                <option value="">Chagua Intake</option>
                <option value="March">March</option>
                <option value="September">September</option>
            </select>
            <button class="btn" id="findCRBtn" onclick="findRelevantCRs()"
                style="background: rgba(0, 210, 255, 0.3); border: 1px solid var(--primary-blue);">
                TAFUTA CRS
            </button>
            <div id="crListDisplay" style="margin-top:20px;"></div>
            <div id="classDataDisplay" style="margin-top:20px;"></div>
            <button class="btn" onclick="switchView('tokenView')" style="background: var(--primary-blue);">Tengeneza
                Kodi ya Somo</button>
            <button class="btn btn-red" onclick="logout()" data-key="logout">Logout</button>
        </div>

        <div id="tokenView" class="hidden">
            <h3 data-key="genAtt">Attendance Control</h3>
            <input type="text" id="sessionSubject" data-key="phSomo" placeholder="Jina la Somo">
            <div class="token-display" id="tokenBox">----</div>
            <p id="timer" data-key="timer">Muda: 3:00</p>
            <button class="btn" onclick="generateToken()" data-key="startAtt">Anza Mahudhurio</button>
            <button class="btn btn-red" onclick="goBackFromToken()">Funga</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwurk9nPOFqPGx9i6REPUQAXnr22XORWOOW0X_k2UlWyR2Op-hDMuTV0nli0QYMTbyiBg/exec";

        let currentUser = null;
        let all_users = [];
        let all_students = [];
        let all_attendance = [];
        let selectedCourseForLec = "";

        async function fetchAllData() {
            try {
                const [u, s, a] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getUsers`).then(r => r.json()),
                    fetch(`${SCRIPT_URL}?action=getStudents`).then(r => r.json()),
                    fetch(`${SCRIPT_URL}?action=getAttendance`).then(r => r.json())
                ]);
                all_users = u;
                all_students = s;
                all_attendance = a;
            } catch (e) { console.error("Kushindwa kupata data", e); }
        }

        function switchView(id) {
            document.querySelectorAll('.container > div').forEach(v => {
                if (v.id) v.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');

            fetchAllData().then(() => {
                if (id === 'crDashboard') renderCR();
                if (id === 'lecDashboard') renderLec();
                updateUI();
            });
        }

        function goBackFromToken() {
            currentUser[2] === 'CR' ? switchView('crDashboard') : switchView('lecDashboard');
        }

        function goBackToDashboard() {
            currentUser[2] === 'CR' ? switchView('crDashboard') : switchView('lecDashboard');
        }

        function toggleRegFields() {
            const isLec = document.getElementById('regRole').value === 'Lecturer';
            document.getElementById('crExtraFields').classList.toggle('hidden', isLec);
            document.getElementById('lecExtraFields').classList.toggle('hidden', !isLec);
        }

        async function handleRegister() {
            const btn = document.getElementById('regBtn');
            btn.innerText = "Inatuma...";
            const data = {
                name: document.getElementById('regName').value,
                phone: document.getElementById('regPhone').value,
                role: document.getElementById('regRole').value,
                course: document.getElementById('regCourse').value || "N/A",
                level: document.getElementById('regLevel').value || "N/A",
                year: document.getElementById('regYear').value || "N/A",
                intake: document.getElementById('regIntake').value || "N/A",
                subject: document.getElementById('regSubject').value || "N/A"
            };
            await fetch(`${SCRIPT_URL}?action=registerUser`, { method: "POST", body: JSON.stringify(data) });
            alert("Usajili Umekamilika!");
            switchView('loginView');
            btn.innerText = "Kamilisha";
        }

        function handleLogin() {
            const name = document.getElementById('logName').value.trim();
            currentUser = all_users.find(u => u[0].toLowerCase() === name.toLowerCase());
            if (currentUser) {
                currentUser[2] === 'CR' ? switchView('crDashboard') : switchView('lecDashboard');
            } else { alert("Akaunti haipo!"); }
        }

        function renderCR() {
            document.getElementById('crCourseName').innerText = currentUser[3];
            const lecs = all_users.filter(u => u[2] === 'Lecturer');
            document.getElementById('lecContactsDisplay').innerHTML = lecs.map(l => `• ${l[0]} (${l[1]}) - Somo: ${l[5]}`).join('<br>');
            const myStudents = all_students.filter(s => s[1] === currentUser[3]);
            document.getElementById('studentListDisplay').innerHTML = myStudents.map(s => `
            <div class="item-card" onclick="openAnalysis('${s[0]}')">
                <span>${s[0]}</span> <small>Angalia Analytics</small>
            </div>`).join('');
        }
        async function addStudent() {
            const nameInput = document.getElementById('newStdName');
            const name = nameInput.value.trim();

            if (!name) return alert("Tafadhali andika jina la mwanafunzi!");

            // Onyesha mchakato unaendelea kwenye button
            const btn = document.querySelector("#studentManager .btn");
            const originalText = btn.innerText;
            btn.innerText = "Inaongeza...";
            btn.disabled = true;

            try {
                // Tunatuma data kama POST Body (JSON)
                await fetch(`${SCRIPT_URL}?action=addStudent`, {
                    method: "POST",
                    body: JSON.stringify({
                        name: name,
                        course: currentUser[3],
                        crName: currentUser[0]
                    })
                });

                nameInput.value = '';
                alert("Mwanafunzi ameongezwa kikamilifu!");

                // Hizi function ni muhimu ili list ijirefresh papo hapo
                if (typeof fetchAllData === "function") await fetchAllData();
                if (typeof renderCR === "function") renderCR();

            } catch (e) {
                console.error("Hitilafu:", e);
                alert("Imeshindwa kuongeza mwanafunzi. Angalia internet yako.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function renderLec() {
            document.getElementById('lecNameShow').innerText = currentUser[0];
            const crUsers = all_users.filter(u => u[2] === 'CR');
            const levels = [...new Set(crUsers.map(u => String(u[4]).trim()))];
            const years = [...new Set(crUsers.map(u => String(u[6]).trim()))];
            document.getElementById('filterLevel').innerHTML = '<option value="">Chagua Level</option>' + levels.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('filterYear').innerHTML = '<option value="">Mwaka wa Masomo</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
        }

        async function findRelevantCRs() {
            const btn = document.getElementById('findCRBtn');
            const lvl = document.getElementById('filterLevel').value.trim();
            const yr = document.getElementById('filterYear').value.trim();
            const intk = document.getElementById('filterIntake').value.trim();
            if (!lvl || !yr || !intk) return alert("Tafadhali jaza Level, Mwaka na Intake!");
            btn.innerText = "Inatafuta..."; btn.disabled = true;
            await fetchAllData();
            const matchingCRs = all_users.filter(u => u[2] === 'CR' && String(u[4]).trim() === lvl && String(u[6]).trim() === yr && String(u[7] || "N/A").trim() === intk);
            btn.innerText = "TAFUTA CRS"; btn.disabled = false;
            if (matchingCRs.length === 0) {
                document.getElementById('crListDisplay').innerHTML = "<p style='font-size:12px; color:var(--accent-red);'>Hakuna CR aliyepatikana.</p>";
                document.getElementById('classDataDisplay').innerHTML = ""; return;
            }
            document.getElementById('crListDisplay').innerHTML = "<p style='font-size:12px; text-align:left;'>Gusa CR kuona wanafunzi:</p>" +
                matchingCRs.map(u => `<div class="item-card" onclick="loadLecStudentsByCR('${u[3]}', '${u[0]}')"><span>${u[0]}</span> <small>${u[3]}</small></div>`).join('');
        }

        function loadLecStudentsByCR(course, crName) {
            selectedCourseForLec = course;
            const stds = all_students.filter(s => s[1] === course);
            document.getElementById('classDataDisplay').innerHTML = `<div style="text-align:left; margin:15px 0;"><strong style="font-size:14px; color:var(--primary-blue);">Wanafunzi wa ${crName} (${course})</strong></div>` +
                stds.map(s => {
                    const count = all_attendance.filter(a => a[0] === s[0] && a[2] === course).length;
                    return `<div class="item-card" onclick="openAnalysis('${s[0]}')"><span>${s[0]}</span> <small>Mahudhurio: ${count}</small></div>`;
                }).join('');
        }

        async function openAnalysis(stdName) {
            switchView('studentDetailView');
            document.getElementById('detStdName').innerText = stdName;
            const myAtt = all_attendance.filter(row => row[0] === stdName);
            const last5Days = [];
            for (let i = 0; i < 5; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                last5Days.push(d.toLocaleDateString('en-GB'));
            }
            document.getElementById('fiveDayStat').innerHTML = last5Days.map(dateStr => {
                const sessions = myAtt.filter(a => a[3] === dateStr);
                return `<div class="day-stat" style="flex-direction:column; align-items:start; padding: 10px 0;">
                <div style="display:flex; justify-content:space-between; width:100%;"><strong>${dateStr}</strong> <span>${sessions.length} Vipindi</span></div>
                ${sessions.length > 0 ? `<small style="color:var(--primary-blue)">${[...new Set(sessions.map(a => a[1]))].join(', ')}</small>` : ''}
            </div>`;
            }).join('');
            const monthlyData = {};
            myAtt.forEach(a => { if (a[6]) monthlyData[a[6]] = (monthlyData[a[6]] || 0) + 1; });
            document.getElementById('monthlyStat').innerHTML = Object.entries(monthlyData).map(([m, t]) => `<div class="day-stat"><span>${m}</span> <strong>${t} Vipindi</strong></div>`).join('') || "No Data";
        }
        async function generateToken() {
            const sub = document.getElementById('sessionSubject').value;
            if (!sub) return alert("Weka Jina la Somo!");

            const token = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('tokenBox').innerText = token;

            // Pata kozi: Kama ni CR anatumia kozi yake, kama ni Lecturer anatumia kozi ya CR aliyemchagua
            let targetCourse = "";
            if (currentUser[2] === 'CR') {
                targetCourse = currentUser[3];
            } else {
                // Hapa inachukua kozi ya CR aliyeguswa (selectedCourseForLec tuliyoiweka awali)
                targetCourse = selectedCourseForLec;
            }

            if (!targetCourse) return alert("Tafadhali chagua darasa kwanza!");

            const payload = {
                token: token,
                subject: sub,
                lecturer: currentUser[0], // Jina la aliyelog-in
                course: targetCourse,
                expiresIn: 180 // Sekunde 180 (Dakika 3)
            };

            try {
                await fetch(`${SCRIPT_URL}?action=setActiveToken`, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                console.log("Data imetumwa kikamilifu!");
            } catch (e) {
                console.error("Hitilafu imetokea:", e);
            }

            // --- Sehemu ya Timer (Baki kama ilivyo kwenye kodi yako ya sasa) ---
            let time = 180;
            if (window.activeTimer) clearInterval(window.activeTimer);
            window.activeTimer = setInterval(() => {
                time--;
                let min = Math.floor(time / 60);
                let sec = time % 60;
                document.getElementById('timer').innerText = `Muda: ${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (time <= 0) {
                    clearInterval(window.activeTimer);
                    document.getElementById('tokenBox').innerText = "EXP";
                }
            }, 1000);
        }

        function logout() { currentUser = null; switchView('landingView'); }

        let currentLang = localStorage.getItem('appLang') || 'sw';
        const translations = {
            'sw': { 'landingTitle': 'IAA Smart Attendance Portal', 'landingReg': 'Tengeneza Akaunti', 'landingLog': 'Ingia', 'regHeader': 'Jisajili', 'backBtn': 'Rudi', 'loginHeader': 'Ingia', 'loginBtnTxt': 'Ingia Sasa', 'crPanel': 'CR Panel:', 'addStd': 'Ongeza Mwanafunzi', 'genToken': 'Tengeneza Kodi', 'logout': 'Logout', 'last5': 'Siku 5 Zilizopita:', 'monthly': 'Mwezi:', 'lecDash': 'Mhadhiri Dashboard', 'genAtt': 'Attendance Control', 'timer': 'Muda: 3:00', 'startAtt': 'Anza Mahudhurio', 'langBtn': 'English 🌐', 'phName': 'Majina Matatu', 'phPhone': 'Namba ya Simu', 'phCourse': 'Kozi', 'phLevel': 'Level', 'phYear': 'Mwaka', 'phSubj': 'Somo Lako', 'phFull': 'Jina Kamili', 'phStd': 'Mwanafunzi', 'phSomo': 'Jina la Somo' },
            'en': { 'landingTitle': 'IAA Smart Attendance Portal', 'landingReg': 'Create Account', 'landingLog': 'Login', 'regHeader': 'Register', 'backBtn': 'Back', 'loginHeader': 'Login', 'loginBtnTxt': 'Login Now', 'crPanel': 'CR Panel:', 'addStd': 'Add Student', 'genToken': 'Generate Code', 'logout': 'Logout', 'last5': 'Past 5 Days:', 'monthly': 'Monthly:', 'lecDash': 'Lecturer Dashboard', 'genAtt': 'Attendance Control', 'timer': 'Time: 3:00', 'startAtt': 'Start Attendance', 'langBtn': 'Kiswahili 🌐', 'phName': 'Three Full Names', 'phPhone': 'Phone Number', 'phCourse': 'Course', 'phLevel': 'Level', 'phYear': 'Year', 'phSubj': 'Your Subject', 'phFull': 'Full Name', 'phStd': 'Student Name', 'phSomo': 'Subject Name' }
        };

        function toggleLanguage() { currentLang = currentLang === 'sw' ? 'en' : 'sw'; localStorage.setItem('appLang', currentLang); updateUI(); }
        function updateUI() {
            document.querySelectorAll('[data-key]').forEach(elem => {
                const key = elem.getAttribute('data-key');
                if (translations[currentLang][key]) {
                    elem.tagName === 'INPUT' ? elem.placeholder = translations[currentLang][key] : elem.innerText = translations[currentLang][key];
                }
            });
            document.getElementById('langBtn').innerText = translations[currentLang]['langBtn'];
        }
        window.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>

</html>
